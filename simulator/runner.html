<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Shift – Simulator</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f4f4f4; color: #161616; }
        main { max-width: 1100px; margin: auto; }
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; background: white; padding: 18px; border-radius: 10px; }
        label { display: grid; gap: 5px; font-weight: 600; }
        input, select, button { font: inherit; padding: 8px; }
        .check { display: flex; align-items: center; gap: 8px; }
        .actions { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 10px; }
        button { cursor: pointer; }
        pre { overflow: auto; min-height: 260px; background: #151515; color: #efefef; padding: 18px; border-radius: 10px; }
        .note { max-width: 75ch; }
    </style>
</head>
<body>
<main>
    <h1>Project Shift – Standalone Simulator</h1>
    <p class="note">The simulator does not use the DOM, animations, or the production game state. Results are deterministic for the same seed.</p>
    <form id="simulation-form">
        <label>Number of Games <input name="games" type="number" min="1" max="100000" value="1000"></label>
        <label>Seed <input name="seed" type="number" value="12345"></label>
        <label>Player 1 <select name="player1"><option value="random">Random</option><option value="greedy">Greedy</option><option value="defensive">Defensive</option></select></label>
        <label>Player 2 <select name="player2"><option value="random">Random</option><option value="greedy">Greedy</option><option value="defensive">Defensive</option></select></label>
        <label>Board Size <input name="boardSize" type="number" min="3" max="10" value="5"></label>
        <label>Symbol Types <input name="symbolCount" type="number" min="3" max="30" value="10"></label>
        <label>Queue Size <input name="queueSize" type="number" min="1" max="10" value="2"></label>
        <label>Starting Score <input name="startingScore" type="number" min="1" max="30" value="7"></label>
        <label>Maximum Turns <input name="maxTurns" type="number" min="10" value="200"></label>
        <label>No-score Turn Limit <input name="noScoreTurnLimit" type="number" min="5" value="50"></label>
        <label class="check"><input name="sharedQueueEnabled" type="checkbox"> Shared Queue</label>
        <label class="check"><input name="topInsertionEnabled" type="checkbox" checked> Top Insertion</label>
        <label class="check"><input name="bottomInsertionEnabled" type="checkbox"> Bottom Insertion</label>
        <div class="actions">
            <button id="run-button" type="button">Run Experiment</button>
            <button id="compare-button" type="button">Compare 6–12 Symbols</button>
        </div>
    </form>
    <h2>Result</h2>
    <pre id="output">No experiment has been run yet.</pre>
</main>
<script type="module" src="./runner.js"></script>
</body>
</html>
